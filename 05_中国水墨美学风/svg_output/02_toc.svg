<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="tocBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8" />
      <stop offset="100%" stop-color="#E8DFD0" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#tocBg)" />
    <rect x="0" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="1272" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="0" y="0" width="1280" height="8" fill="#2C2C2C" />
    <rect x="0" y="712" width="1280" height="8" fill="#2C2C2C" />
  </g>

  <g id="title-toc-header" data-anim="true">
<text x="80" y="80" font-family="SimSun, serif" font-size="12" fill="#8B4513" letter-spacing="3">目录</text>
    <line x1="80" y1="90" x2="140" y2="90" stroke="#8B4513" stroke-width="1" />
  </g>

  <g id="card-toc-items" data-anim="true">
<g id="item-1" data-anim="true">
<text x="80" y="160" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">壹</text>
      <text x="200" y="150" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#2C2C2C">水墨之道</text>
      <text x="200" y="180" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#6B6B6B">传统水墨艺术的核心理念</text>
      <line x1="80" y1="200" x2="700" y2="200" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-2" data-anim="true">
<text x="80" y="260" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">贰</text>
      <text x="200" y="250" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#2C2C2C">笔墨技法</text>
      <text x="200" y="280" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#6B6B6B">运笔、用墨、构图要诀</text>
      <line x1="80" y1="300" x2="700" y2="300" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-3" data-anim="true">
<text x="80" y="360" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">叁</text>
      <text x="200" y="350" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#2C2C2C">意境营造</text>
      <text x="200" y="380" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#6B6B6B">虚实相生、留白之美</text>
      <line x1="80" y1="400" x2="700" y2="400" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-4" data-anim="true">
<text x="80" y="460" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">肆</text>
      <text x="200" y="450" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#2C2C2C">现代融合</text>
      <text x="200" y="480" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#6B6B6B">传统美学与当代设计</text>
      <line x1="80" y1="500" x2="700" y2="500" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-5" data-anim="true">
<text x="80" y="560" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">伍</text>
      <text x="200" y="550" font-family="Microsoft YaHei, sans-serif" font-size="20" fill="#2C2C2C">作品赏析</text>
      <text x="200" y="580" font-family="Microsoft YaHei, sans-serif" font-size="13" fill="#6B6B6B">经典与当代水墨作品</text>
    </g>
  </g>

  <g id="sidebar">
    <rect x="800" y="120" width="400" height="500" fill="#2C2C2C" opacity="0.05" />
    <text x="1000" y="300" font-family="SimSun, serif" font-size="120" fill="#2C2C2C" opacity="0.1" text-anchor="middle">目录</text>
    <text x="1000" y="380" font-family="Microsoft YaHei, sans-serif" font-size="16" fill="#6B6B6B" text-anchor="middle">5 章节</text>
    <line x1="850" y1="400" x2="1150" y2="400" stroke="#2C2C2C" stroke-width="0.5" opacity="0.3" />
    <text x="1000" y="440" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#8B8B8B" text-anchor="middle">8 页</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="SimSun, serif" font-size="11" fill="#8B8B8B">02</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8B8B8B" stroke-width="0.5" />
  </g>
</svg>
