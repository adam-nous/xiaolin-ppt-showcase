<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="sumBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8" />
      <stop offset="100%" stop-color="#E8DFD0" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#sumBg)" />
    <rect x="0" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="1272" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="0" y="0" width="1280" height="8" fill="#2C2C2C" />
    <rect x="0" y="712" width="1280" height="8" fill="#2C2C2C" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="SimSun, serif" font-size="12" fill="#8B4513" letter-spacing="3">总结</text>
    <text x="80" y="100" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">传承与创新</text>
    <line x1="80" y1="115" x2="280" y2="115" stroke="#8B4513" stroke-width="1" />
  </g>

  <g id="card-key-points" data-anim="true">
<rect x="80" y="150" width="560" height="300" fill="#FFFFFF" opacity="0.5" />
    <text x="100" y="190" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">核心要义</text>
    <line x1="100" y1="200" x2="220" y2="200" stroke="#8B4513" stroke-width="1" />
    <text x="100" y="230" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 气韵生动是水墨艺术的灵魂</text>
    <text x="100" y="260" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 虚实相生是意境营造的核心</text>
    <text x="100" y="290" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 留白之美是东方美学的精髓</text>
    <text x="100" y="320" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 笔墨技法是表现力的基础</text>
    <text x="100" y="350" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 传统与现代的融合是发展方向</text>
    <text x="100" y="380" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 传承与创新并重是时代使命</text>
  </g>

  <g id="future">
    <rect x="660" y="150" width="540" height="300" fill="#2C2C2C" opacity="0.05" />
    <text x="680" y="190" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">未来展望</text>
    <line x1="680" y1="200" x2="800" y2="200" stroke="#8B4513" stroke-width="1" />
    <text x="680" y="230" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 数字水墨艺术的发展</text>
    <text x="680" y="260" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 水墨美学的国际化传播</text>
    <text x="680" y="290" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 传统技法的创新应用</text>
    <text x="680" y="320" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 跨领域融合设计</text>
    <text x="680" y="350" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 文化自信与美学复兴</text>
    <text x="680" y="380" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">• 新时代的东方美学</text>
  </g>

  <g id="takeaway-quote" data-anim="true">
<rect x="80" y="480" width="1120" height="100" fill="#2C2C2C" opacity="0.05" />
    <text x="640" y="530" font-family="SimSun, serif" font-size="24" fill="#2C2C2C" text-anchor="middle">"笔墨当随时代"</text>
    <text x="640" y="560" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#6B6B6B" text-anchor="middle">— 清 · 石涛</text>
  </g>

  <g id="seal">
    <rect x="1000" y="600" width="100" height="100" fill="#C41E3A" opacity="0.8" />
    <text x="1050" y="650" font-family="SimSun, serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">墨</text>
    <text x="1050" y="690" font-family="SimSun, serif" font-size="36" font-weight="700" fill="#FFFFFF" text-anchor="middle">韵</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="SimSun, serif" font-size="11" fill="#8B8B8B">08</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8B8B8B" stroke-width="0.5" />
  </g>
</svg>
