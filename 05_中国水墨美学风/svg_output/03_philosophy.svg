<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="philBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8" />
      <stop offset="100%" stop-color="#E8DFD0" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#philBg)" />
    <rect x="0" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="1272" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="0" y="0" width="1280" height="8" fill="#2C2C2C" />
    <rect x="0" y="712" width="1280" height="8" fill="#2C2C2C" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="SimSun, serif" font-size="12" fill="#8B4513" letter-spacing="3">壹</text>
    <text x="80" y="100" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">水墨之道</text>
    <line x1="80" y1="115" x2="250" y2="115" stroke="#8B4513" stroke-width="1" />
  </g>

  <g id="content" data-anim="true">
<g id="principle-1">
      <rect x="80" y="150" width="360" height="200" fill="#FFFFFF" opacity="0.5" />
      <rect x="80" y="150" width="4" height="200" fill="#8B4513" />
      <text x="110" y="190" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">气韵生动</text>
      <text x="110" y="220" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">水墨艺术的灵魂所在，</text>
      <text x="110" y="245" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">通过笔墨的浓淡干湿，</text>
      <text x="110" y="270" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">表现万物的生机与神韵。</text>
    </g>

    <g id="principle-2">
      <rect x="460" y="150" width="360" height="200" fill="#FFFFFF" opacity="0.5" />
      <rect x="460" y="150" width="4" height="200" fill="#2C2C2C" />
      <text x="490" y="190" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">骨法用笔</text>
      <text x="490" y="220" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">以书法入画，讲究笔力、</text>
      <text x="490" y="245" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">笔势、笔意，通过线条</text>
      <text x="490" y="270" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">表现物象的质感与精神。</text>
    </g>

    <g id="principle-3">
      <rect x="840" y="150" width="360" height="200" fill="#FFFFFF" opacity="0.5" />
      <rect x="840" y="150" width="4" height="200" fill="#8B4513" />
      <text x="870" y="190" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">应物象形</text>
      <text x="870" y="220" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">师法自然，以形写神，</text>
      <text x="870" y="245" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">不求形似，但求神似，</text>
      <text x="870" y="270" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">达到形神兼备的境界。</text>
    </g>
  </g>

  <g id="takeaway-quote" data-anim="true">
<rect x="80" y="380" width="1120" height="120" fill="#2C2C2C" opacity="0.05" />
    <text x="640" y="430" font-family="SimSun, serif" font-size="24" fill="#2C2C2C" text-anchor="middle">"外师造化，中得心源"</text>
    <text x="640" y="470" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#6B6B6B" text-anchor="middle">— 唐 · 张璪</text>
  </g>

  <g id="ink-elements">
    <circle cx="200" cy="600" r="60" fill="#2C2C2C" opacity="0.03" />
    <circle cx="400" cy="580" r="40" fill="#2C2C2C" opacity="0.02" />
    <circle cx="600" cy="620" r="50" fill="#2C2C2C" opacity="0.04" />
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="SimSun, serif" font-size="11" fill="#8B8B8B">03</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8B8B8B" stroke-width="0.5" />
  </g>
</svg>
