<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="artBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8" />
      <stop offset="100%" stop-color="#E8DFD0" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#artBg)" />
    <rect x="0" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="1272" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="0" y="0" width="1280" height="8" fill="#2C2C2C" />
    <rect x="0" y="712" width="1280" height="8" fill="#2C2C2C" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="SimSun, serif" font-size="12" fill="#8B4513" letter-spacing="3">叁</text>
    <text x="80" y="100" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">意境营造</text>
    <line x1="80" y1="115" x2="250" y2="115" stroke="#8B4513" stroke-width="1" />
  </g>

  <g id="concepts">
    <g id="concept-1">
      <rect x="80" y="150" width="360" height="250" fill="#FFFFFF" opacity="0.5" />
      <text x="100" y="190" font-family="SimSun, serif" font-size="24" fill="#2C2C2C">虚实相生</text>
      <line x1="100" y1="200" x2="250" y2="200" stroke="#8B4513" stroke-width="1" />
      <text x="100" y="230" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">虚与实的对比与统一，</text>
      <text x="100" y="255" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">是水墨艺术的核心美学。</text>
      <text x="100" y="280" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">虚处不空，实处不塞，</text>
      <text x="100" y="305" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">虚实相生，气韵流转。</text>
      <rect x="100" y="330" width="320" height="40" fill="#2C2C2C" opacity="0.05" />
      <text x="260" y="355" font-family="SimSun, serif" font-size="16" fill="#2C2C2C" text-anchor="middle">计白当黑</text>
    </g>

    <g id="concept-2">
      <rect x="460" y="150" width="360" height="250" fill="#FFFFFF" opacity="0.5" />
      <text x="480" y="190" font-family="SimSun, serif" font-size="24" fill="#2C2C2C">留白之美</text>
      <line x1="480" y1="200" x2="630" y2="200" stroke="#8B4513" stroke-width="1" />
      <text x="480" y="230" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">留白不是空白，而是</text>
      <text x="480" y="255" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">意境的延伸与想象的空间。</text>
      <text x="480" y="280" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">以无胜有，以少胜多，</text>
      <text x="480" y="305" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">给观者以无限遐想。</text>
      <rect x="480" y="330" width="320" height="40" fill="#2C2C2C" opacity="0.05" />
      <text x="640" y="355" font-family="SimSun, serif" font-size="16" fill="#2C2C2C" text-anchor="middle">此处无声胜有声</text>
    </g>

    <g id="concept-3">
      <rect x="840" y="150" width="360" height="250" fill="#FFFFFF" opacity="0.5" />
      <text x="860" y="190" font-family="SimSun, serif" font-size="24" fill="#2C2C2C">气韵生动</text>
      <line x1="860" y1="200" x2="1010" y2="200" stroke="#8B4513" stroke-width="1" />
      <text x="860" y="230" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">气韵是水墨艺术的灵魂，</text>
      <text x="860" y="255" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">是生命力的体现。</text>
      <text x="860" y="280" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">通过笔墨的节奏与韵律，</text>
      <text x="860" y="305" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">表现万物的生机与神韵。</text>
      <rect x="860" y="330" width="320" height="40" fill="#2C2C2C" opacity="0.05" />
      <text x="1020" y="355" font-family="SimSun, serif" font-size="16" fill="#2C2C2C" text-anchor="middle">生生不息</text>
    </g>
  </g>

  <g id="takeaway-quote" data-anim="true">
<rect x="80" y="430" width="1120" height="100" fill="#2C2C2C" opacity="0.05" />
    <text x="640" y="480" font-family="SimSun, serif" font-size="20" fill="#2C2C2C" text-anchor="middle">"山不在高，有仙则名；水不在深，有龙则灵"</text>
    <text x="640" y="510" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#6B6B6B" text-anchor="middle">— 唐 · 刘禹锡</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="SimSun, serif" font-size="11" fill="#8B8B8B">05</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8B8B8B" stroke-width="0.5" />
  </g>
</svg>
