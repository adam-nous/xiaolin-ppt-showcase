<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="modBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8" />
      <stop offset="100%" stop-color="#E8DFD0" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#modBg)" />
    <rect x="0" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="1272" y="0" width="8" height="720" fill="#2C2C2C" />
    <rect x="0" y="0" width="1280" height="8" fill="#2C2C2C" />
    <rect x="0" y="712" width="1280" height="8" fill="#2C2C2C" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="SimSun, serif" font-size="12" fill="#8B4513" letter-spacing="3">肆</text>
    <text x="80" y="100" font-family="SimSun, serif" font-size="36" fill="#2C2C2C">现代融合</text>
    <line x1="80" y1="115" x2="250" y2="115" stroke="#8B4513" stroke-width="1" />
  </g>

  <g id="fusion-areas">
    <g id="area-1">
      <rect x="80" y="150" width="560" height="180" fill="#FFFFFF" opacity="0.5" />
      <rect x="80" y="150" width="4" height="180" fill="#8B4513" />
      <text x="110" y="190" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">平面设计</text>
      <text x="110" y="220" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">水墨元素在海报、包装、品牌中的应用，</text>
      <text x="110" y="245" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">传统笔墨与现代排版的结合，</text>
      <text x="110" y="270" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">创造独特的东方美学视觉语言。</text>
    </g>

    <g id="area-2">
      <rect x="660" y="150" width="540" height="180" fill="#FFFFFF" opacity="0.5" />
      <rect x="660" y="150" width="4" height="180" fill="#2C2C2C" />
      <text x="690" y="190" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">数字媒体</text>
      <text x="690" y="220" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">水墨动画、交互设计、数字艺术，</text>
      <text x="690" y="245" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">将传统水墨的意境与现代技术结合，</text>
      <text x="690" y="270" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">创造沉浸式的东方美学体验。</text>
    </g>

    <g id="area-3">
      <rect x="80" y="360" width="560" height="180" fill="#FFFFFF" opacity="0.5" />
      <rect x="80" y="360" width="4" height="180" fill="#8B4513" />
      <text x="110" y="400" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">空间设计</text>
      <text x="110" y="430" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">水墨元素在室内设计、建筑设计中的应用，</text>
      <text x="110" y="455" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">通过留白、意境、气韵的营造，</text>
      <text x="110" y="480" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">创造具有东方意境的现代空间。</text>
    </g>

    <g id="area-4">
      <rect x="660" y="360" width="540" height="180" fill="#FFFFFF" opacity="0.5" />
      <rect x="660" y="360" width="4" height="180" fill="#2C2C2C" />
      <text x="690" y="400" font-family="SimSun, serif" font-size="20" fill="#2C2C2C">产品设计</text>
      <text x="690" y="430" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">水墨美学在产品设计中的应用，</text>
      <text x="690" y="455" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">从材质、形态、色彩等方面，</text>
      <text x="690" y="480" font-family="Microsoft YaHei, sans-serif" font-size="14" fill="#4A4A4A">创造具有东方韵味的现代产品。</text>
    </g>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="SimSun, serif" font-size="11" fill="#8B8B8B">06</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8B8B8B" stroke-width="0.5" />
  </g>
</svg>
