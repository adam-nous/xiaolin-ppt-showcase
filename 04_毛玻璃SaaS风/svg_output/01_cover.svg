<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="glassBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#glassBg)" />
    <circle cx="200" cy="200" r="150" fill="#ffffff" opacity="0.1" filter="url(#blur)" />
    <circle cx="1000" cy="500" r="200" fill="#ffffff" opacity="0.08" filter="url(#blur)" />
    <circle cx="600" cy="600" r="100" fill="#ffffff" opacity="0.12" filter="url(#blur)" />
  </g>

  <g id="hero-glass-card" data-anim="true">
<rect x="80" y="80" width="1120" height="560" rx="20" fill="#ffffff" opacity="0.15" />
    <rect x="80" y="80" width="1120" height="560" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3" />
  </g>

  <g id="title-marks" data-anim="true">
<rect x="120" y="140" width="80" height="4" fill="#ffffff" opacity="0.8" />
    <text x="120" y="180" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" opacity="0.8" letter-spacing="2.5">GLASSMORPHISM · SAAS</text>
  </g>

  <g id="title-main" data-anim="true">
<text x="120" y="300" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">Modern</text>
    <text x="120" y="380" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">SaaS</text>
    <text x="120" y="460" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff">Platform</text>
  </g>

  <g id="card-subtitle" data-anim="true">
<line x1="120" y1="500" x2="220" y2="500" stroke="#ffffff" stroke-width="1.5" opacity="0.6" />
    <text x="120" y="530" font-family="Inter, Arial, sans-serif" font-size="18" fill="#ffffff" opacity="0.8">下一代云端服务平台</text>
    <text x="120" y="560" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6">2026 年度产品发布</text>
  </g>

  <g id="glass-features" data-anim="true">
<rect x="700" y="200" width="400" height="300" rx="16" fill="#ffffff" opacity="0.1" />
    <rect x="700" y="200" width="400" height="300" rx="16" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
    <text x="720" y="240" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" opacity="0.9">KEY FEATURES</text>
    <text x="720" y="280" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 云端部署，零配置</text>
    <text x="720" y="310" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 实时协作，多人编辑</text>
    <text x="720" y="340" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• AI 驱动，智能分析</text>
    <text x="720" y="370" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 企业级安全，SOC2 认证</text>
    <text x="720" y="400" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 99.99% SLA 保障</text>
  </g>

  <g id="footer">
    <text x="1160" y="620" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5">01</text>
  </g>
</svg>
