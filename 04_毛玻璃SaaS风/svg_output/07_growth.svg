<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="growBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#growBg)" />
    <circle cx="500" cy="400" r="250" fill="#ffffff" opacity="0.04" />
    <circle cx="1000" cy="200" r="180" fill="#ffffff" opacity="0.06" />
  </g>

  <g id="hero-glass-card" data-anim="true">
<rect x="80" y="60" width="1120" height="600" rx="20" fill="#ffffff" opacity="0.12" />
    <rect x="80" y="60" width="1120" height="600" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  </g>

  <g id="header" data-anim="true">
<text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="3">GROWTH</text>
    <text x="120" y="170" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">增长策略</text>
    <line x1="120" y1="185" x2="280" y2="185" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  </g>

  <g id="kpi-growth" data-anim="true">
<rect x="120" y="220" width="240" height="120" rx="16" fill="#ffffff" opacity="0.1" />
    <text x="240" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">300%</text>
    <text x="240" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6" text-anchor="middle">年增长率</text>

    <rect x="380" y="220" width="240" height="120" rx="16" fill="#ffffff" opacity="0.1" />
    <text x="500" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">50K+</text>
    <text x="500" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6" text-anchor="middle">付费客户</text>

    <rect x="640" y="220" width="240" height="120" rx="16" fill="#ffffff" opacity="0.1" />
    <text x="760" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">$10M</text>
    <text x="760" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6" text-anchor="middle">年度收入</text>

    <rect x="900" y="220" width="200" height="120" rx="16" fill="#ffffff" opacity="0.1" />
    <text x="1000" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">95%</text>
    <text x="1000" y="300" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6" text-anchor="middle">客户留存</text>
  </g>

  <g id="card-strategy">
    <rect x="120" y="370" width="1000" height="200" rx="16" fill="#ffffff" opacity="0.08" />
    <text x="140" y="410" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">GROWTH STRATEGY</text>
    <line x1="140" y1="420" x2="350" y2="420" stroke="#ffffff" stroke-width="1" opacity="0.4" />
    <text x="140" y="450" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 产品驱动增长（PLG）：免费试用 → 付费转化</text>
    <text x="140" y="480" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 内容营销：技术博客、案例研究、白皮书</text>
    <text x="140" y="510" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 合作伙伴：系统集成商、技术合作伙伴</text>
    <text x="140" y="540" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">• 社区建设：开发者社区、用户大会</text>
  </g>

  <g id="footer">
    <text x="1160" y="640" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5">07</text>
  </g>
</svg>
