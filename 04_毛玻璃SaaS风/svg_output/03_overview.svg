<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="ovBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#ovBg)" />
    <circle cx="200" cy="400" r="250" fill="#ffffff" opacity="0.05" />
    <circle cx="1000" cy="300" r="180" fill="#ffffff" opacity="0.07" />
  </g>

  <g id="hero-glass-card" data-anim="true">
<rect x="80" y="60" width="1120" height="600" rx="20" fill="#ffffff" opacity="0.12" />
    <rect x="80" y="60" width="1120" height="600" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  </g>

  <g id="header" data-anim="true">
<text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="3">PRODUCT OVERVIEW</text>
    <text x="120" y="170" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">产品概述</text>
    <line x1="120" y1="185" x2="350" y2="185" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  </g>

  <g id="value-props">
    <g id="prop-1">
      <rect x="120" y="220" width="320" height="160" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="140" y="260" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">云端优先</text>
      <text x="140" y="290" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">零配置部署，开箱即用</text>
      <text x="140" y="320" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">自动扩缩容，按需付费</text>
      <text x="140" y="350" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">全球 CDN 加速</text>
    </g>

    <g id="prop-2">
      <rect x="460" y="220" width="320" height="160" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="480" y="260" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">实时协作</text>
      <text x="480" y="290" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">多人实时编辑，无冲突</text>
      <text x="480" y="320" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">版本历史，一键回滚</text>
      <text x="480" y="350" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">评论、@提及、通知</text>
    </g>

    <g id="prop-3">
      <rect x="800" y="220" width="320" height="160" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="820" y="260" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">AI 驱动</text>
      <text x="820" y="290" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">智能内容生成</text>
      <text x="820" y="320" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">自动化工作流</text>
      <text x="820" y="350" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.7">数据洞察分析</text>
    </g>
  </g>

  <g id="kpi-metrics" data-anim="true">
<rect x="120" y="420" width="1000" height="120" rx="16" fill="#ffffff" opacity="0.08" />
    <text x="320" y="470" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">10M+</text>
    <text x="320" y="500" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6" text-anchor="middle">活跃用户</text>
    <text x="640" y="470" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">99.99%</text>
    <text x="640" y="500" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6" text-anchor="middle">SLA 保障</text>
    <text x="960" y="470" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">50ms</text>
    <text x="960" y="500" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6" text-anchor="middle">平均响应</text>
  </g>

  <g id="footer">
    <text x="1160" y="640" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5">03</text>
  </g>
</svg>
