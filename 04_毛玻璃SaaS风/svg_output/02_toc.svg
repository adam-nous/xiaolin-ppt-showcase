<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="tocBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#tocBg)" />
    <circle cx="300" cy="300" r="200" fill="#ffffff" opacity="0.05" />
    <circle cx="900" cy="500" r="150" fill="#ffffff" opacity="0.08" />
  </g>

  <g id="hero-glass-card" data-anim="true">
<rect x="80" y="60" width="1120" height="600" rx="20" fill="#ffffff" opacity="0.12" />
    <rect x="80" y="60" width="1120" height="600" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  </g>

  <g id="title-toc-header" data-anim="true">
<text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="3">TABLE OF CONTENTS</text>
    <line x1="120" y1="130" x2="320" y2="130" stroke="#ffffff" stroke-width="1" opacity="0.4" />
  </g>

  <g id="card-toc-items" data-anim="true">
<g id="item-1" data-anim="true">
<rect x="120" y="170" width="480" height="80" rx="12" fill="#ffffff" opacity="0.1" />
      <text x="150" y="210" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff">产品概述</text>
      <text x="150" y="235" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6">核心价值、目标用户、市场定位</text>
    </g>

    <g id="item-2" data-anim="true">
<rect x="120" y="270" width="480" height="80" rx="12" fill="#ffffff" opacity="0.1" />
      <text x="150" y="310" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff">核心功能</text>
      <text x="150" y="335" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6">主要功能模块与技术亮点</text>
    </g>

    <g id="item-3" data-anim="true">
<rect x="120" y="370" width="480" height="80" rx="12" fill="#ffffff" opacity="0.1" />
      <text x="150" y="410" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff">技术架构</text>
      <text x="150" y="435" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6">云原生架构、微服务、容器化</text>
    </g>

    <g id="item-4" data-anim="true">
<rect x="120" y="470" width="480" height="80" rx="12" fill="#ffffff" opacity="0.1" />
      <text x="150" y="510" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff">商业模式</text>
      <text x="150" y="535" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6">定价策略、收入模型、增长计划</text>
    </g>
  </g>

  <g id="sidebar">
    <rect x="680" y="170" width="440" height="380" rx="16" fill="#ffffff" opacity="0.08" />
    <text x="900" y="320" font-family="Inter, Arial, sans-serif" font-size="120" font-weight="700" fill="#ffffff" opacity="0.3" text-anchor="middle">02</text>
    <text x="900" y="400" font-family="Inter, Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.6" text-anchor="middle">4 SECTIONS</text>
    <text x="900" y="430" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.5" text-anchor="middle">8 PAGES</text>
  </g>

  <g id="footer">
    <text x="1160" y="640" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5">02</text>
  </g>
</svg>
