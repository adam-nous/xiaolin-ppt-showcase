<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="priceBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#priceBg)" />
    <circle cx="300" cy="500" r="200" fill="#ffffff" opacity="0.05" />
    <circle cx="900" cy="200" r="150" fill="#ffffff" opacity="0.07" />
  </g>

  <g id="hero-glass-card" data-anim="true">
<rect x="80" y="60" width="1120" height="600" rx="20" fill="#ffffff" opacity="0.12" />
    <rect x="80" y="60" width="1120" height="600" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  </g>

  <g id="header" data-anim="true">
<text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="3">PRICING</text>
    <text x="120" y="170" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">定价方案</text>
    <line x1="120" y1="185" x2="250" y2="185" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  </g>

  <g id="pricing-cards" data-anim="true">
<g id="plan-free">
      <rect x="120" y="220" width="300" height="350" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="270" y="270" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Free</text>
      <text x="270" y="320" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">$0</text>
      <text x="270" y="350" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6" text-anchor="middle">/月</text>
      <text x="270" y="390" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 5 个项目</text>
      <text x="270" y="420" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 1GB 存储</text>
      <text x="270" y="450" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 基础功能</text>
      <rect x="170" y="490" width="200" height="40" rx="20" fill="#ffffff" opacity="0.2" />
      <text x="270" y="515" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">开始使用</text>
    </g>

    <g id="plan-pro">
      <rect x="440" y="200" width="320" height="390" rx="16" fill="#ffffff" opacity="0.2" />
      <rect x="440" y="200" width="320" height="390" rx="16" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5" />
      <text x="600" y="250" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Pro</text>
      <text x="600" y="300" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">$29</text>
      <text x="600" y="330" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6" text-anchor="middle">/月</text>
      <text x="600" y="370" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 无限项目</text>
      <text x="600" y="400" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 100GB 存储</text>
      <text x="600" y="430" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• AI 功能</text>
      <text x="600" y="460" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 优先支持</text>
      <rect x="490" y="500" width="220" height="40" rx="20" fill="#ffffff" />
      <text x="600" y="525" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#667eea" text-anchor="middle">升级 Pro</text>
    </g>

    <g id="plan-enterprise">
      <rect x="780" y="220" width="300" height="350" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="930" y="270" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Enterprise</text>
      <text x="930" y="320" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">$99</text>
      <text x="930" y="350" font-family="Inter, Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.6" text-anchor="middle">/月</text>
      <text x="930" y="390" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 一切 Pro 功能</text>
      <text x="930" y="420" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 无限存储</text>
      <text x="930" y="450" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.7" text-anchor="middle">• 专属支持</text>
      <rect x="830" y="490" width="200" height="40" rx="20" fill="#ffffff" opacity="0.2" />
      <text x="930" y="515" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">联系我们</text>
    </g>
  </g>

  <g id="footer">
    <text x="1160" y="640" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5">06</text>
  </g>
</svg>
