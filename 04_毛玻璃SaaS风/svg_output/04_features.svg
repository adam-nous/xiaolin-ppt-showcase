<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="featBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#featBg)" />
    <circle cx="400" cy="200" r="200" fill="#ffffff" opacity="0.05" />
    <circle cx="800" cy="600" r="150" fill="#ffffff" opacity="0.08" />
  </g>

  <g id="hero-glass-card" data-anim="true">
<rect x="80" y="60" width="1120" height="600" rx="20" fill="#ffffff" opacity="0.12" />
    <rect x="80" y="60" width="1120" height="600" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  </g>

  <g id="header" data-anim="true">
<text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="3">CORE FEATURES</text>
    <text x="120" y="170" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">核心功能</text>
    <line x1="120" y1="185" x2="300" y2="185" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  </g>

  <g id="features-grid">
    <g id="feature-1">
      <rect x="120" y="220" width="240" height="180" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="240" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">📊</text>
      <text x="240" y="310" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">数据分析</text>
      <text x="240" y="340" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">实时数据仪表盘</text>
      <text x="240" y="360" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">自定义报表</text>
    </g>

    <g id="feature-2">
      <rect x="380" y="220" width="240" height="180" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="500" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">🤖</text>
      <text x="500" y="310" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">AI 助手</text>
      <text x="500" y="340" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">智能内容生成</text>
      <text x="500" y="360" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">自动化工作流</text>
    </g>

    <g id="feature-3">
      <rect x="640" y="220" width="240" height="180" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="760" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">🔗</text>
      <text x="760" y="310" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">集成平台</text>
      <text x="760" y="340" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">200+ 应用集成</text>
      <text x="760" y="360" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">API 优先设计</text>
    </g>

    <g id="feature-4">
      <rect x="900" y="220" width="240" height="180" rx="16" fill="#ffffff" opacity="0.1" />
      <text x="1020" y="270" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">🔒</text>
      <text x="1020" y="310" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">企业安全</text>
      <text x="1020" y="340" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">SOC2 Type II</text>
      <text x="1020" y="360" font-family="Inter, Arial, sans-serif" font-size="12" fill="#ffffff" opacity="0.6" text-anchor="middle">端到端加密</text>
    </g>
  </g>

  <g id="card-tech-stack" data-anim="true">
<rect x="120" y="430" width="1000" height="120" rx="16" fill="#ffffff" opacity="0.08" />
    <text x="140" y="470" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" opacity="0.8">TECH STACK</text>
    <text x="140" y="500" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6">React · Node.js · PostgreSQL · Redis · Kubernetes · Docker</text>
    <text x="140" y="525" font-family="Inter, Arial, sans-serif" font-size="13" fill="#ffffff" opacity="0.6">AWS · Cloudflare · Stripe · OpenAI · LangChain</text>
  </g>

  <g id="footer">
    <text x="1160" y="640" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5">04</text>
  </g>
</svg>
