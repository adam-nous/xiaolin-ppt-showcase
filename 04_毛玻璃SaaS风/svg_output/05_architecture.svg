<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#archBg)" />
    <circle cx="600" cy="300" r="300" fill="#ffffff" opacity="0.03" />
  </g>

  <g id="hero-glass-card" data-anim="true">
<rect x="80" y="60" width="1120" height="600" rx="20" fill="#ffffff" opacity="0.12" />
    <rect x="80" y="60" width="1120" height="600" rx="20" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  </g>

  <g id="header" data-anim="true">
<text x="120" y="120" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.7" letter-spacing="3">ARCHITECTURE</text>
    <text x="120" y="170" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">技术架构</text>
    <line x1="120" y1="185" x2="300" y2="185" stroke="#ffffff" stroke-width="2" opacity="0.6" />
  </g>

  <g id="arch-layers">
    <g id="layer-1">
      <rect x="120" y="220" width="1000" height="80" rx="12" fill="#ffffff" opacity="0.15" />
      <text x="620" y="270" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">客户端层 · React · Next.js · TypeScript</text>
    </g>

    <g id="layer-2">
      <rect x="120" y="320" width="1000" height="80" rx="12" fill="#ffffff" opacity="0.12" />
      <text x="620" y="370" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">API 网关 · GraphQL · REST · WebSocket</text>
    </g>

    <g id="layer-3">
      <rect x="120" y="420" width="1000" height="80" rx="12" fill="#ffffff" opacity="0.1" />
      <text x="620" y="470" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">微服务层 · Node.js · Python · Go</text>
    </g>

    <g id="layer-4">
      <rect x="120" y="520" width="1000" height="80" rx="12" fill="#ffffff" opacity="0.08" />
      <text x="620" y="570" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">数据层 · PostgreSQL · Redis · Kafka · S3</text>
    </g>
  </g>

  <g id="arrows">
    <line x1="620" y1="300" x2="620" y2="320" stroke="#ffffff" stroke-width="2" opacity="0.5" />
    <line x1="620" y1="400" x2="620" y2="420" stroke="#ffffff" stroke-width="2" opacity="0.5" />
    <line x1="620" y1="500" x2="620" y2="520" stroke="#ffffff" stroke-width="2" opacity="0.5" />
  </g>

  <g id="footer">
    <text x="1160" y="640" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="11" fill="#ffffff" opacity="0.5">05</text>
  </g>
</svg>
