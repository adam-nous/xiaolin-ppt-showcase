<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="compBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA" />
      <stop offset="100%" stop-color="#F5F5F5" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#compBg)" />
    <line x1="80" y1="0" x2="80" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
    <line x1="400" y1="0" x2="400" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
    <line x1="720" y1="0" x2="720" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
    <line x1="1040" y1="0" x2="1040" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#E53E3E" letter-spacing="3">COMPONENTS</text>
    <text x="80" y="100" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#1A202C">组件库</text>
    <line x1="80" y1="115" x2="300" y2="115" stroke="#E53E3E" stroke-width="2" />
  </g>

  <g id="buttons">
    <rect x="80" y="150" width="360" height="200" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
    <text x="100" y="180" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1A202C">BUTTONS</text>
    <rect x="100" y="200" width="120" height="40" fill="#E53E3E" rx="0" />
    <text x="160" y="225" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Primary</text>
    <rect x="240" y="200" width="120" height="40" fill="#1A202C" rx="0" />
    <text x="300" y="225" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">Secondary</text>
    <rect x="100" y="260" width="120" height="40" fill="none" stroke="#E53E3E" stroke-width="2" rx="0" />
    <text x="160" y="285" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#E53E3E" text-anchor="middle">Outline</text>
  </g>

  <g id="cards" data-anim="true">
<rect x="460" y="150" width="360" height="200" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
    <text x="480" y="180" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1A202C">CARDS</text>
    <rect x="480" y="200" width="320" height="120" fill="#F7FAFC" stroke="#E0E0E0" stroke-width="1" />
    <text x="640" y="250" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1A202C" text-anchor="middle">Card Title</text>
    <text x="640" y="280" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568" text-anchor="middle">Card content goes here</text>
  </g>

  <g id="inputs">
    <rect x="840" y="150" width="360" height="200" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
    <text x="860" y="180" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1A202C">INPUTS</text>
    <rect x="860" y="200" width="320" height="40" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
    <text x="880" y="225" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#A0AEC0">Placeholder text</text>
    <rect x="860" y="260" width="320" height="40" fill="#FFFFFF" stroke="#E53E3E" stroke-width="2" />
    <text x="880" y="285" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#1A202C">Input value</text>
  </g>

  <g id="table">
    <rect x="80" y="380" width="1120" height="200" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" />
    <text x="100" y="410" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1A202C">TABLE</text>
    <line x1="80" y1="430" x2="1200" y2="430" stroke="#E0E0E0" stroke-width="1" />
    <text x="100" y="460" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1A202C">Name</text>
    <text x="400" y="460" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1A202C">Type</text>
    <text x="700" y="460" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1A202C">Status</text>
    <line x1="80" y1="470" x2="1200" y2="470" stroke="#E0E0E0" stroke-width="1" />
    <text x="100" y="500" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">Component A</text>
    <text x="400" y="500" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">Button</text>
    <text x="700" y="500" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#48BB78">Active</text>
    <text x="100" y="530" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">Component B</text>
    <text x="400" y="530" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">Card</text>
    <text x="700" y="530" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#E53E3E">Inactive</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#A0AEC0">07</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#A0AEC0" stroke-width="0.5" />
  </g>
</svg>
