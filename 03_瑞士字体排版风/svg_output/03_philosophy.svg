<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="philBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA" />
      <stop offset="100%" stop-color="#F5F5F5" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#philBg)" />
    <line x1="80" y1="0" x2="80" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
    <line x1="400" y1="0" x2="400" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
    <line x1="720" y1="0" x2="720" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
    <line x1="1040" y1="0" x2="1040" y2="720" stroke="#E0E0E0" stroke-width="0.5" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#E53E3E" letter-spacing="3">PHILOSOPHY</text>
    <text x="80" y="100" font-family="Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#1A202C">设计理念</text>
    <line x1="80" y1="115" x2="300" y2="115" stroke="#E53E3E" stroke-width="2" />
  </g>

  <g id="content" data-anim="true">
<g id="principle-1">
      <rect x="80" y="150" width="360" height="180" fill="#FFFFFF" rx="0" stroke="#E0E0E0" stroke-width="1" />
      <text x="100" y="190" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1A202C">网格系统</text>
      <text x="100" y="220" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">严格的网格系统是瑞士设计的</text>
      <text x="100" y="245" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">基础，确保布局的一致性和</text>
      <text x="100" y="270" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">可预测性。</text>
    </g>

    <g id="principle-2">
      <rect x="460" y="150" width="360" height="180" fill="#FFFFFF" rx="0" stroke="#E0E0E0" stroke-width="1" />
      <text x="480" y="190" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1A202C">字体排版</text>
      <text x="480" y="220" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">无衬线字体为主，强调可读性</text>
      <text x="480" y="245" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">和层次感，通过字号、字重</text>
      <text x="480" y="270" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">创造视觉节奏。</text>
    </g>

    <g id="principle-3">
      <rect x="840" y="150" width="360" height="180" fill="#FFFFFF" rx="0" stroke="#E0E0E0" stroke-width="1" />
      <text x="860" y="190" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1A202C">视觉层次</text>
      <text x="860" y="220" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">通过大小、粗细、颜色的对比</text>
      <text x="860" y="245" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">建立清晰的信息层次，引导</text>
      <text x="860" y="270" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#4A5568">用户视线流动。</text>
    </g>
  </g>

  <g id="takeaway-quote" data-anim="true">
<rect x="80" y="370" width="1120" height="120" fill="#1A202C" />
    <text x="640" y="420" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="#FFFFFF" text-anchor="middle">"好的设计是尽可能少的设计。"</text>
    <text x="640" y="460" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#A0AEC0" text-anchor="middle">— Dieter Rams</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#A0AEC0">03</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#A0AEC0" stroke-width="0.5" />
  </g>
</svg>
