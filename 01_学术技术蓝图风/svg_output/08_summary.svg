<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="sumBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A365D" />
      <stop offset="100%" stop-color="#0F1F3D" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#sumBg)" />
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#2A4A7F" stroke-width="0.3" />
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#2A4A7F" stroke-width="0.3" />
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#2A4A7F" stroke-width="0.3" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="80" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#3182CE" letter-spacing="3">SUMMARY</text>
    <text x="80" y="130" font-family="Georgia, serif" font-size="48" font-weight="700" fill="#FFFFFF">总结与展望</text>
    <line x1="80" y1="145" x2="350" y2="145" stroke="#3182CE" stroke-width="2" />
  </g>

  <g id="card-key-points" data-anim="true">
<g id="point-1">
      <rect x="80" y="200" width="6" height="80" fill="#3182CE" />
      <text x="100" y="230" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#FFFFFF">架构升级</text>
      <text x="100" y="260" font-family="Arial, sans-serif" font-size="14" fill="#A0C4E8">从单体架构成功迁移至微服务架构</text>
    </g>

    <g id="point-2">
      <rect x="80" y="300" width="6" height="80" fill="#3182CE" />
      <text x="100" y="330" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#FFFFFF">性能提升</text>
      <text x="100" y="360" font-family="Arial, sans-serif" font-size="14" fill="#A0C4E8">响应时间降低 80%，吞吐量提升 3x</text>
    </g>

    <g id="point-3">
      <rect x="80" y="400" width="6" height="80" fill="#3182CE" />
      <text x="100" y="430" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#FFFFFF">成本优化</text>
      <text x="100" y="460" font-family="Arial, sans-serif" font-size="14" fill="#A0C4E8">运维成本降低 40%，资源利用率提升</text>
    </g>
  </g>

  <g id="next-steps" data-anim="true">
<rect x="640" y="200" width="560" height="280" fill="#0F1F3D" rx="8" stroke="#2A4A7F" stroke-width="1" />
    <text x="660" y="240" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#3182CE">NEXT STEPS</text>
    <line x1="660" y1="250" x2="800" y2="250" stroke="#3182CE" stroke-width="1" />
    <text x="660" y="280" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">1. 完成剩余服务迁移</text>
    <text x="660" y="310" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">2. 引入服务网格 (Istio)</text>
    <text x="660" y="340" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">3. 建立全链路监控</text>
    <text x="660" y="370" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">4. 实现自动化运维</text>
    <text x="660" y="400" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">5. 持续性能优化</text>
  </g>

  <g id="contact">
    <rect x="80" y="540" width="1120" height="100" fill="#3182CE" rx="8" />
    <text x="640" y="580" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">开始构建下一代分布式系统</text>
    <text x="640" y="620" font-family="Consolas, monospace" font-size="16" fill="#A0C4E8" text-anchor="middle">contact@tech-team.com | github.com/tech-team</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#5A7AA0">08</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#5A7AA0" stroke-width="0.5" />
  </g>
</svg>
