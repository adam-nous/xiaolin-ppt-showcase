<g id="case-1">
      <rect x="80" y="150" width="560" height="180" fill="#FFFFFF" rx="8" stroke="#E2E8F0" stroke-width="1" />
      <rect x="80" y="150" width="8" height="180" fill="#3182CE" rx="4" />
      <text x="110" y="190" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1A365D">电商交易平台</text>
      <text x="110" y="220" font-family="Arial, sans-serif" font-size="14" fill="#4A5568">• 日均订单处理量：100万+</text>
