      <text x="670" y="220" font-family="Arial, sans-serif" font-size="14" fill="#4A5568">• 实时交易风控：毫秒级响应</text>
      <text x="670" y="245" font-family="Arial, sans-serif" font-size="14" fill="#4A5568">• 风险识别准确率：99.5%</text>
      <text x="670" y="270" font-family="Arial, sans-serif" font-size="14" fill="#4A5568">• 业务价值：欺诈损失降低 80%</text>
      <text x="670" y="300" font-family="Consolas, monospace" font-size="12" fill="#3182CE">[Stream Processing] [ML Pipeline]</text>
    </g>

