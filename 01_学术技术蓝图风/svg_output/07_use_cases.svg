    <g id="case-4">
      <rect x="640" y="360" width="560" height="180" fill="#FFFFFF" rx="8" stroke="#E2E8F0" stroke-width="1" />
      <rect x="640" y="360" width="8" height="180" fill="#4A6A9F" rx="4" />
      <text x="670" y="400" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1A365D">内容分发网络</text>
      <text x="670" y="430" font-family="Arial, sans-serif" font-size="14" fill="#4A5568">• 全球节点覆盖：50+</text>
      <text x="670" y="455" font-family="Arial, sans-serif" font-size="14" fill="#4A5568">• 内容分发延迟：&lt; 50ms</text>
      <text x="670" y="480" font-family="Arial, sans-serif" font-size="14" fill="#4A5568">• 业务价值：用户访问速度提升 5x</text>
      <text x="670" y="510" font-family="Consolas, monospace" font-size="12" fill="#3182CE">[CDN] [Edge Cache] [Global Load Balance]</text>
