  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#3182CE" letter-spacing="3">USE CASES</text>
    <text x="80" y="100" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#1A365D">应用场景与案例</text>
    <line x1="80" y1="115" x2="380" y2="115" stroke="#3182CE" stroke-width="2" />
