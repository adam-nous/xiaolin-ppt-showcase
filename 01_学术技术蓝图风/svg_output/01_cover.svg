<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="coverBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A365D" />
      <stop offset="100%" stop-color="#0F1F3D" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#coverBg)" />
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#2A4A7F" stroke-width="0.3" />
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#2A4A7F" stroke-width="0.3" />
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#2A4A7F" stroke-width="0.3" />
    <line x1="320" y1="0" x2="320" y2="720" stroke="#2A4A7F" stroke-width="0.3" />
    <line x1="640" y1="0" x2="640" y2="720" stroke="#2A4A7F" stroke-width="0.3" />
    <line x1="960" y1="0" x2="960" y2="720" stroke="#2A4A7F" stroke-width="0.3" />
  </g>

  <g id="title-marks" data-anim="true">
<rect x="80" y="120" width="80" height="4" fill="#3182CE" />
    <text x="80" y="160" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#3182CE" letter-spacing="2.5">TECHNICAL · BLUEPRINT</text>
  </g>

  <g id="title-main" data-anim="true">
<text x="80" y="320" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#FFFFFF">System</text>
    <text x="80" y="394" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#FFFFFF">Architecture</text>
    <text x="80" y="468" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#FFFFFF">Design</text>
  </g>

  <g id="card-subtitle" data-anim="true">
<line x1="80" y1="510" x2="180" y2="510" stroke="#3182CE" stroke-width="1.5" />
    <text x="80" y="540" font-family="Arial, sans-serif" font-size="18" fill="#A0C4E8">技术架构设计与实现方案</text>
    <text x="80" y="570" font-family="Arial, sans-serif" font-size="14" fill="#7B9CC0">2026 年度技术评审</text>
  </g>

  <g id="takeaway-main" data-anim="true">
<rect x="80" y="600" width="6" height="56" fill="#3182CE" />
    <text x="100" y="622" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#3182CE" letter-spacing="1">KEY OBJECTIVE</text>
    <text x="100" y="648" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#FFFFFF">构建高性能、可扩展的分布式系统架构</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#5A7AA0">01</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#5A7AA0" stroke-width="0.5" />
  </g>
