<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="modBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7FAFC" />
      <stop offset="100%" stop-color="#EDF2F7" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#modBg)" />
    <rect x="0" y="0" width="6" height="720" fill="#1A365D" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Consolas, monospace" font-size="12" font-weight="700" fill="#3182CE" letter-spacing="3">CORE MODULES</text>
    <text x="80" y="100" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#1A365D">核心模块设计</text>
    <line x1="80" y1="115" x2="350" y2="115" stroke="#3182CE" stroke-width="2" />
  </g>

  <g id="card-modules" data-anim="true">
<g id="module-1">
      <rect x="80" y="150" width="360" height="180" fill="#FFFFFF" rx="8" stroke="#E2E8F0" stroke-width="1" />
      <rect x="80" y="150" width="360" height="6" fill="#3182CE" rx="8" />
      <text x="100" y="190" font-family="Consolas, monospace" font-size="16" font-weight="700" fill="#1A365D">认证授权模块</text>
      <text x="100" y="220" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• JWT Token 管理</text>
      <text x="100" y="245" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• OAuth 2.0 集成</text>
      <text x="100" y="270" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• RBAC 权限控制</text>
      <text x="100" y="295" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 多因素认证支持</text>
    </g>

    <g id="module-2">
      <rect x="460" y="150" width="360" height="180" fill="#FFFFFF" rx="8" stroke="#E2E8F0" stroke-width="1" />
      <rect x="460" y="150" width="360" height="6" fill="#1A365D" rx="8" />
      <text x="480" y="190" font-family="Consolas, monospace" font-size="16" font-weight="700" fill="#1A365D">数据处理模块</text>
      <text x="480" y="220" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 流式数据处理</text>
      <text x="480" y="245" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 批量任务调度</text>
      <text x="480" y="270" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 数据清洗转换</text>
      <text x="480" y="295" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 实时数据同步</text>
    </g>

    <g id="module-3">
      <rect x="840" y="150" width="360" height="180" fill="#FFFFFF" rx="8" stroke="#E2E8F0" stroke-width="1" />
      <rect x="840" y="150" width="360" height="6" fill="#2A4A7F" rx="8" />
      <text x="860" y="190" font-family="Consolas, monospace" font-size="16" font-weight="700" fill="#1A365D">监控告警模块</text>
      <text x="860" y="220" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 实时性能监控</text>
      <text x="860" y="245" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 异常自动检测</text>
      <text x="860" y="270" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 多渠道告警通知</text>
      <text x="860" y="295" font-family="Arial, sans-serif" font-size="13" fill="#4A5568">• 日志聚合分析</text>
    </g>
  </g>

  <g id="card-tech-stack" data-anim="true">
<rect x="80" y="370" width="1120" height="200" fill="#1A365D" rx="8" />
    <text x="100" y="410" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#3182CE">TECHNOLOGY STACK</text>
    <line x1="100" y1="420" x2="300" y2="420" stroke="#3182CE" stroke-width="1" />
    
    <text x="100" y="450" font-family="Consolas, monospace" font-size="13" fill="#A0C4E8">Runtime:</text>
    <text x="200" y="450" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Node.js 20 LTS / Go 1.22</text>
    
    <text x="100" y="480" font-family="Consolas, monospace" font-size="13" fill="#A0C4E8">Database:</text>
    <text x="200" y="480" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">PostgreSQL 16 / Redis 7</text>
    
    <text x="100" y="510" font-family="Consolas, monospace" font-size="13" fill="#A0C4E8">Queue:</text>
    <text x="200" y="510" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Apache Kafka 3.7</text>
    
    <text x="100" y="540" font-family="Consolas, monospace" font-size="13" fill="#A0C4E8">Container:</text>
    <text x="200" y="540" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF">Docker + Kubernetes</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#A0AEC0">05</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#A0AEC0" stroke-width="0.5" />
  </g>
</svg>
