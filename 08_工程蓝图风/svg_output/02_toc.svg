<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="tocBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A" />
      <stop offset="100%" stop-color="#0A1628" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#tocBg)" />
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="320" y1="0" x2="320" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="640" y1="0" x2="640" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="960" y1="0" x2="960" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <rect x="0" y="0" width="1280" height="3" fill="#4A90D9" />
    <rect x="0" y="717" width="1280" height="3" fill="#4A90D9" />
  </g>

  <g id="title-toc-header" data-anim="true">
<text x="80" y="80" font-family="Consolas, monospace" font-size="12" fill="#4A90D9" letter-spacing="3">TABLE OF CONTENTS</text>
    <line x1="80" y1="90" x2="280" y2="90" stroke="#4A90D9" stroke-width="1" />
  </g>

  <g id="card-toc-items" data-anim="true">
<g id="item-1" data-anim="true">
<text x="80" y="160" font-family="Consolas, monospace" font-size="36" fill="#4A90D9">01</text>
      <text x="200" y="150" font-family="Consolas, monospace" font-size="20" fill="#FFFFFF">系统概述</text>
      <text x="200" y="180" font-family="Arial, sans-serif" font-size="14" fill="#4A7AAB">系统目标、架构原则、技术选型</text>
      <line x1="80" y1="200" x2="700" y2="200" stroke="#4A90D9" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-2" data-anim="true">
<text x="80" y="260" font-family="Consolas, monospace" font-size="36" fill="#4A90D9">02</text>
      <text x="200" y="250" font-family="Consolas, monospace" font-size="20" fill="#FFFFFF">架构设计</text>
      <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#4A7AAB">整体架构、模块划分、接口设计</text>
      <line x1="80" y1="300" x2="700" y2="300" stroke="#4A90D9" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-3" data-anim="true">
<text x="80" y="360" font-family="Consolas, monospace" font-size="36" fill="#4A90D9">03</text>
      <text x="200" y="350" font-family="Consolas, monospace" font-size="20" fill="#FFFFFF">详细设计</text>
      <text x="200" y="380" font-family="Arial, sans-serif" font-size="14" fill="#4A7AAB">数据模型、算法设计、流程图</text>
      <line x1="80" y1="400" x2="700" y2="400" stroke="#4A90D9" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-4" data-anim="true">
<text x="80" y="460" font-family="Consolas, monospace" font-size="36" fill="#4A90D9">04</text>
      <text x="200" y="450" font-family="Consolas, monospace" font-size="20" fill="#FFFFFF">技术规范</text>
      <text x="200" y="480" font-family="Arial, sans-serif" font-size="14" fill="#4A7AAB">编码规范、测试策略、部署方案</text>
      <line x1="80" y1="500" x2="700" y2="500" stroke="#4A90D9" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-5" data-anim="true">
<text x="80" y="560" font-family="Consolas, monospace" font-size="36" fill="#4A90D9">05</text>
      <text x="200" y="550" font-family="Consolas, monospace" font-size="20" fill="#FFFFFF">实施计划</text>
      <text x="200" y="580" font-family="Arial, sans-serif" font-size="14" fill="#4A7AAB">开发计划、里程碑、风险管理</text>
    </g>
  </g>

  <g id="sidebar">
    <rect x="800" y="120" width="400" height="500" fill="#4A90D9" opacity="0.05" />
    <text x="1000" y="300" font-family="Consolas, monospace" font-size="120" fill="#4A90D9" opacity="0.1" text-anchor="middle">02</text>
    <text x="1000" y="380" font-family="Arial, sans-serif" font-size="16" fill="#7A9CC6" text-anchor="middle">5 SECTIONS</text>
    <line x1="850" y1="400" x2="1150" y2="400" stroke="#4A90D9" stroke-width="0.5" opacity="0.3" />
    <text x="1000" y="440" font-family="Arial, sans-serif" font-size="14" fill="#4A7AAB" text-anchor="middle">8 PAGES</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#4A7AAB">02</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#4A7AAB" stroke-width="0.5" />
  </g>
</svg>
