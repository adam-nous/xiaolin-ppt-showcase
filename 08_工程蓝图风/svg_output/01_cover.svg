    <line x1="800" y1="400" x2="1200" y2="400" stroke="#4A90D9" stroke-width="0.5" opacity="0.15" />
    <line x1="800" y1="500" x2="1200" y2="500" stroke="#4A90D9" stroke-width="0.5" opacity="0.15" />
    <line x1="900" y1="200" x2="900" y2="600" stroke="#4A90D9" stroke-width="0.5" opacity="0.15" />
    <line x1="1000" y1="200" x2="1000" y2="600" stroke="#4A90D9" stroke-width="0.5" opacity="0.15" />
    <line x1="1100" y1="200" x2="1100" y2="600" stroke="#4A90D9" stroke-width="0.5" opacity="0.15" />
