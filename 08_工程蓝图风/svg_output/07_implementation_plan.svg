<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="implBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A" />
      <stop offset="100%" stop-color="#0A1628" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#implBg)" />
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="320" y1="0" x2="320" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="640" y1="0" x2="640" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="960" y1="0" x2="960" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <rect x="0" y="0" width="1280" height="3" fill="#4A90D9" />
    <rect x="0" y="717" width="1280" height="3" fill="#4A90D9" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Consolas, monospace" font-size="12" fill="#4A90D9" letter-spacing="3">IMPLEMENTATION PLAN</text>
    <text x="80" y="100" font-family="Consolas, monospace" font-size="36" fill="#FFFFFF">实施计划</text>
    <line x1="80" y1="115" x2="300" y2="115" stroke="#4A90D9" stroke-width="2" />
  </g>

  <g id="card-timeline" data-anim="true">
<g id="phase-1">
      <rect x="80" y="150" width="280" height="200" fill="#4A90D9" opacity="0.15" />
      <text x="220" y="190" font-family="Consolas, monospace" font-size="18" fill="#4A90D9" text-anchor="middle">第一阶段</text>
      <text x="220" y="220" font-family="Consolas, monospace" font-size="24" fill="#FFFFFF" text-anchor="middle">0-3 个月</text>
      <text x="220" y="250" font-family="Arial, sans-serif" font-size="13" fill="#7A9CC6" text-anchor="middle">基础架构</text>
      <text x="100" y="280" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• 技术选型确认</text>
      <text x="100" y="300" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• 开发环境搭建</text>
      <text x="100" y="320" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• CI/CD 流水线</text>
    </g>

    <g id="phase-2">
      <rect x="380" y="150" width="280" height="200" fill="#4A90D9" opacity="0.1" />
      <text x="520" y="190" font-family="Consolas, monospace" font-size="18" fill="#4A90D9" text-anchor="middle">第二阶段</text>
      <text x="520" y="220" font-family="Consolas, monospace" font-size="24" fill="#FFFFFF" text-anchor="middle">3-6 个月</text>
      <text x="520" y="250" font-family="Arial, sans-serif" font-size="13" fill="#7A9CC6" text-anchor="middle">核心开发</text>
      <text x="400" y="280" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• 核心服务开发</text>
      <text x="400" y="300" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• 数据库设计</text>
      <text x="400" y="320" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• API 接口开发</text>
    </g>

    <g id="phase-3">
      <rect x="680" y="150" width="280" height="200" fill="#4A90D9" opacity="0.15" />
      <text x="820" y="190" font-family="Consolas, monospace" font-size="18" fill="#4A90D9" text-anchor="middle">第三阶段</text>
      <text x="820" y="220" font-family="Consolas, monospace" font-size="24" fill="#FFFFFF" text-anchor="middle">6-9 个月</text>
      <text x="820" y="250" font-family="Arial, sans-serif" font-size="13" fill="#7A9CC6" text-anchor="middle">集成测试</text>
      <text x="700" y="280" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• 系统集成测试</text>
      <text x="700" y="300" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• 性能优化</text>
      <text x="700" y="320" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• 安全审计</text>
    </g>

    <g id="milestones">
      <rect x="980" y="150" width="220" height="200" fill="#4A90D9" opacity="0.08" />
      <text x="1090" y="190" font-family="Consolas, monospace" font-size="18" fill="#4A90D9" text-anchor="middle">关键里程碑</text>
      <text x="1090" y="220" font-family="Arial, sans-serif" font-size="13" fill="#7A9CC6" text-anchor="middle">M1: 架构评审</text>
      <text x="1090" y="250" font-family="Arial, sans-serif" font-size="13" fill="#7A9CC6" text-anchor="middle">M3: Alpha 版本</text>
      <text x="1090" y="280" font-family="Arial, sans-serif" font-size="13" fill="#7A9CC6" text-anchor="middle">M6: Beta 版本</text>
      <text x="1090" y="310" font-family="Arial, sans-serif" font-size="13" fill="#7A9CC6" text-anchor="middle">M9: 正式发布</text>
    </g>
  </g>

  <g id="card-resources" data-anim="true">
<rect x="80" y="380" width="1120" height="150" fill="#4A90D9" opacity="0.05" />
    <text x="100" y="420" font-family="Consolas, monospace" font-size="18" fill="#4A90D9">资源配置</text>
    <line x1="100" y1="430" x2="220" y2="430" stroke="#4A90D9" stroke-width="1" />
    <text x="100" y="460" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 人力资源：10 名工程师 + 2 名架构师 + 1 名 PM</text>
    <text x="100" y="490" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 基础设施：AWS / GCP / Azure（多云策略）</text>
    <text x="100" y="520" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 预算：$2M（人力 $1.5M + 基础设施 $0.5M）</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#4A7AAB">07</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#4A7AAB" stroke-width="0.5" />
  </g>
</svg>
