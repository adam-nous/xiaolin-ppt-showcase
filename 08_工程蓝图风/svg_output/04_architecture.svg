<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="archBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A" />
      <stop offset="100%" stop-color="#0A1628" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#archBg)" />
    <line x1="0" y1="180" x2="1280" y2="180" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="0" y1="360" x2="1280" y2="360" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="0" y1="540" x2="1280" y2="540" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="320" y1="0" x2="320" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="640" y1="0" x2="640" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <line x1="960" y1="0" x2="960" y2="720" stroke="#1B3A5C" stroke-width="0.3" />
    <rect x="0" y="0" width="1280" height="3" fill="#4A90D9" />
    <rect x="0" y="717" width="1280" height="3" fill="#4A90D9" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Consolas, monospace" font-size="12" fill="#4A90D9" letter-spacing="3">ARCHITECTURE</text>
    <text x="80" y="100" font-family="Consolas, monospace" font-size="36" fill="#FFFFFF">架构设计</text>
    <line x1="80" y1="115" x2="280" y2="115" stroke="#4A90D9" stroke-width="2" />
  </g>

  <g id="chart-arch-diagram" data-anim="true">
<g id="layer-1">
      <rect x="80" y="150" width="1120" height="60" fill="#4A90D9" opacity="0.2" />
      <text x="640" y="190" font-family="Consolas, monospace" font-size="18" fill="#FFFFFF" text-anchor="middle">客户端层 · Web / Mobile / API</text>
    </g>

    <g id="layer-2">
      <rect x="80" y="230" width="1120" height="60" fill="#4A90D9" opacity="0.15" />
      <text x="640" y="270" font-family="Consolas, monospace" font-size="18" fill="#FFFFFF" text-anchor="middle">网关层 · API Gateway / Load Balancer / Auth</text>
    </g>

    <g id="layer-3">
      <rect x="80" y="310" width="1120" height="60" fill="#4A90D9" opacity="0.1" />
      <text x="640" y="350" font-family="Consolas, monospace" font-size="18" fill="#FFFFFF" text-anchor="middle">服务层 · User / Order / Product / Payment</text>
    </g>

    <g id="layer-4">
      <rect x="80" y="390" width="1120" height="60" fill="#4A90D9" opacity="0.08" />
      <text x="640" y="430" font-family="Consolas, monospace" font-size="18" fill="#FFFFFF" text-anchor="middle">数据层 · PostgreSQL / Redis / Kafka / S3</text>
    </g>

    <g id="layer-5">
      <rect x="80" y="470" width="1120" height="60" fill="#4A90D9" opacity="0.05" />
      <text x="640" y="510" font-family="Consolas, monospace" font-size="18" fill="#FFFFFF" text-anchor="middle">基础设施层 · Kubernetes / Docker / Terraform</text>
    </g>
  </g>

  <g id="arrows">
    <line x1="640" y1="210" x2="640" y2="230" stroke="#4A90D9" stroke-width="2" />
    <line x1="640" y1="290" x2="640" y2="310" stroke="#4A90D9" stroke-width="2" />
    <line x1="640" y1="370" x2="640" y2="390" stroke="#4A90D9" stroke-width="2" />
    <line x1="640" y1="450" x2="640" y2="470" stroke="#4A90D9" stroke-width="2" />
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Consolas, monospace" font-size="11" fill="#4A7AAB">04</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#4A7AAB" stroke-width="0.5" />
  </g>
</svg>
