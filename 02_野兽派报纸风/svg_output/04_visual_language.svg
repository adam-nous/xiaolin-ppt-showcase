<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="#1A1A1A" />
    <rect x="0" y="0" width="1280" height="8" fill="#FF0000" />
    <rect x="0" y="712" width="1280" height="8" fill="#FF0000" />
  </g>

  <g id="header" data-anim="true">
<rect x="40" y="40" width="1200" height="60" fill="#FF0000" />
    <text x="640" y="80" font-family="Impact, Arial Black, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">VISUAL LANGUAGE</text>
  </g>

  <g id="title-main-title" data-anim="true">
<text x="80" y="180" font-family="Impact, Arial Black, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF">粗犷</text>
    <text x="80" y="260" font-family="Impact, Arial Black, sans-serif" font-size="64" font-weight="900" fill="#FF0000">原始</text>
    <text x="80" y="340" font-family="Impact, Arial Black, sans-serif" font-size="64" font-weight="900" fill="#FFFFFF">有力</text>
  </g>

  <g id="chart-color-palette" data-anim="true">
<rect x="80" y="380" width="200" height="120" fill="#FF0000" />
    <text x="180" y="450" font-family="Impact, Arial Black, sans-serif" font-size="24" font-weight="900" fill="#FFFFFF" text-anchor="middle">#FF0000</text>
    
    <rect x="300" y="380" width="200" height="120" fill="#1A1A1A" stroke="#FF0000" stroke-width="2" />
    <text x="400" y="450" font-family="Impact, Arial Black, sans-serif" font-size="24" font-weight="900" fill="#FFFFFF" text-anchor="middle">#1A1A1A</text>
    
    <rect x="520" y="380" width="200" height="120" fill="#FFFFFF" />
    <text x="620" y="450" font-family="Impact, Arial Black, sans-serif" font-size="24" font-weight="900" fill="#1A1A1A" text-anchor="middle">#FFFFFF</text>
    
    <rect x="740" y="380" width="200" height="120" fill="#333333" />
    <text x="840" y="450" font-family="Impact, Arial Black, sans-serif" font-size="24" font-weight="900" fill="#FFFFFF" text-anchor="middle">#333333</text>
  </g>

  <g id="card-typography" data-anim="true">
<rect x="80" y="530" width="860" height="120" fill="#333333" />
    <text x="100" y="570" font-family="Impact, Arial Black, sans-serif" font-size="18" font-weight="900" fill="#FF0000">TYPOGRAPHY</text>
    <text x="100" y="600" font-family="Impact, Arial Black, sans-serif" font-size="48" font-weight="900" fill="#FFFFFF">IMPACT</text>
    <text x="100" y="630" font-family="Arial, sans-serif" font-size="16" fill="#CCCCCC">大字号 · 粗字体 · 无衬线 · 高对比</text>
  </g>

  <g id="sidebar">
    <rect x="980" y="380" width="220" height="270" fill="#333333" />
    <text x="1090" y="420" font-family="Impact, Arial Black, sans-serif" font-size="80" font-weight="900" fill="#FF0000" text-anchor="middle">04</text>
    <text x="1090" y="480" font-family="Arial, sans-serif" font-size="16" fill="#CCCCCC" text-anchor="middle">VISUAL</text>
    <text x="1090" y="510" font-family="Arial, sans-serif" font-size="16" fill="#CCCCCC" text-anchor="middle">LANGUAGE</text>
  </g>

  <g id="footer-bar">
    <rect x="40" y="640" width="1200" height="40" fill="#333333" />
    <text x="640" y="665" font-family="Arial, sans-serif" font-size="14" fill="#CCCCCC" text-anchor="middle">BRUTALIST NEWSPAPER · 2026</text>
  </g>
</svg>
