    <line x1="100" y1="390" x2="300" y2="390" stroke="#FF0000" stroke-width="2" />
    <text x="100" y="420" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">• 粗犷、原始、有力的设计语言</text>
    <text x="100" y="450" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">• 高对比度色彩策略（黑、白、红）</text>
    <text x="100" y="480" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF">• 大字号、粗字体、无衬线排版</text>
