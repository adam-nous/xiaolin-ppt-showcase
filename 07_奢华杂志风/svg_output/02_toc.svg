<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="tocBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#0F0F1A" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#tocBg)" />
    <rect x="0" y="0" width="1280" height="3" fill="#D4AF37" />
    <rect x="0" y="717" width="1280" height="3" fill="#D4AF37" />
    <rect x="0" y="0" width="3" height="720" fill="#D4AF37" />
    <rect x="1277" y="0" width="3" height="720" fill="#D4AF37" />
  </g>

  <g id="title-toc-header" data-anim="true">
<text x="80" y="80" font-family="Georgia, serif" font-size="12" fill="#D4AF37" letter-spacing="4">TABLE OF CONTENTS</text>
    <line x1="80" y1="90" x2="300" y2="90" stroke="#D4AF37" stroke-width="1" />
  </g>

  <g id="card-toc-items" data-anim="true">
<g id="item-1" data-anim="true">
<text x="80" y="160" font-family="Georgia, serif" font-size="36" fill="#D4AF37">01</text>
      <text x="200" y="150" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">品牌哲学</text>
      <text x="200" y="180" font-family="Georgia, serif" font-size="14" fill="#8A7A6A">奢华品牌的核心价值与美学理念</text>
      <line x1="80" y1="200" x2="700" y2="200" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-2" data-anim="true">
<text x="80" y="260" font-family="Georgia, serif" font-size="36" fill="#D4AF37">02</text>
      <text x="200" y="250" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">视觉语言</text>
      <text x="200" y="280" font-family="Georgia, serif" font-size="14" fill="#8A7A6A">色彩、字体、图像的奢华表达</text>
      <line x1="80" y1="300" x2="700" y2="300" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-3" data-anim="true">
<text x="80" y="360" font-family="Georgia, serif" font-size="36" fill="#D4AF37">03</text>
      <text x="200" y="350" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">排版艺术</text>
      <text x="200" y="380" font-family="Georgia, serif" font-size="14" fill="#8A7A6A">高级排版技巧与视觉层次</text>
      <line x1="80" y1="400" x2="700" y2="400" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-4" data-anim="true">
<text x="80" y="460" font-family="Georgia, serif" font-size="36" fill="#D4AF37">04</text>
      <text x="200" y="450" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">图像处理</text>
      <text x="200" y="480" font-family="Georgia, serif" font-size="14" fill="#8A7A6A">高端摄影与视觉叙事</text>
      <line x1="80" y1="500" x2="700" y2="500" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-5" data-anim="true">
<text x="80" y="560" font-family="Georgia, serif" font-size="36" fill="#D4AF37">05</text>
      <text x="200" y="550" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">案例赏析</text>
      <text x="200" y="580" font-family="Georgia, serif" font-size="14" fill="#8A7A6A">顶级奢侈品牌设计案例</text>
    </g>
  </g>

  <g id="sidebar">
    <rect x="800" y="120" width="400" height="500" fill="#D4AF37" opacity="0.03" />
    <text x="1000" y="300" font-family="Georgia, serif" font-size="120" fill="#D4AF37" opacity="0.1" text-anchor="middle">02</text>
    <text x="1000" y="380" font-family="Georgia, serif" font-size="16" fill="#B8A080" text-anchor="middle">5 SECTIONS</text>
    <line x1="850" y1="400" x2="1150" y2="400" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" />
    <text x="1000" y="440" font-family="Georgia, serif" font-size="14" fill="#8A7A6A" text-anchor="middle">8 PAGES</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#8A7A6A">02</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8A7A6A" stroke-width="0.5" />
  </g>
</svg>
