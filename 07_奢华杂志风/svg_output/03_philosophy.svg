<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="philBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#0F0F1A" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#philBg)" />
    <rect x="0" y="0" width="1280" height="3" fill="#D4AF37" />
    <rect x="0" y="717" width="1280" height="3" fill="#D4AF37" />
    <rect x="0" y="0" width="3" height="720" fill="#D4AF37" />
    <rect x="1277" y="0" width="3" height="720" fill="#D4AF37" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Georgia, serif" font-size="12" fill="#D4AF37" letter-spacing="4">01</text>
    <text x="80" y="100" font-family="Georgia, serif" font-size="36" fill="#FFFFFF">品牌哲学</text>
    <line x1="80" y1="115" x2="250" y2="115" stroke="#D4AF37" stroke-width="2" />
  </g>

  <g id="content" data-anim="true">
<g id="value-1">
      <rect x="80" y="150" width="360" height="200" fill="#D4AF37" opacity="0.05" />
      <rect x="80" y="150" width="4" height="200" fill="#D4AF37" />
      <text x="110" y="190" font-family="Georgia, serif" font-size="20" fill="#D4AF37">传承</text>
      <text x="110" y="220" font-family="Georgia, serif" font-size="14" fill="#B8A080">百年品牌的积淀与传承，</text>
      <text x="110" y="245" font-family="Georgia, serif" font-size="14" fill="#B8A080">每一处细节都承载着</text>
      <text x="110" y="270" font-family="Georgia, serif" font-size="14" fill="#B8A080">历史的厚重与文化的底蕴。</text>
    </g>

    <g id="value-2">
      <rect x="460" y="150" width="360" height="200" fill="#D4AF37" opacity="0.03" />
      <rect x="460" y="150" width="4" height="200" fill="#D4AF37" />
      <text x="490" y="190" font-family="Georgia, serif" font-size="20" fill="#D4AF37">工艺</text>
      <text x="490" y="220" font-family="Georgia, serif" font-size="14" fill="#B8A080">精湛的手工技艺，</text>
      <text x="490" y="245" font-family="Georgia, serif" font-size="14" fill="#B8A080">对完美的极致追求，</text>
      <text x="490" y="270" font-family="Georgia, serif" font-size="14" fill="#B8A080">每一件作品都是艺术品。</text>
    </g>

    <g id="value-3">
      <rect x="840" y="150" width="360" height="200" fill="#D4AF37" opacity="0.05" />
      <rect x="840" y="150" width="4" height="200" fill="#D4AF37" />
      <text x="870" y="190" font-family="Georgia, serif" font-size="20" fill="#D4AF37">创新</text>
      <text x="870" y="220" font-family="Georgia, serif" font-size="14" fill="#B8A080">在传承中创新，</text>
      <text x="870" y="245" font-family="Georgia, serif" font-size="14" fill="#B8A080">将经典与现代融合，</text>
      <text x="870" y="270" font-family="Georgia, serif" font-size="14" fill="#B8A080">创造永恒的美学价值。</text>
    </g>
  </g>

  <g id="takeaway-quote" data-anim="true">
<rect x="80" y="380" width="1120" height="120" fill="#D4AF37" opacity="0.03" />
    <text x="640" y="430" font-family="Georgia, serif" font-size="24" fill="#FFFFFF" text-anchor="middle">"奢华不是价格的堆砌，而是对完美的执着"</text>
    <text x="640" y="470" font-family="Georgia, serif" font-size="14" fill="#8A7A6A" text-anchor="middle">— 奢华品牌宣言</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#8A7A6A">03</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8A7A6A" stroke-width="0.5" />
  </g>
</svg>
