<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="luxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#0F0F1A" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#luxBg)" />
    <rect x="0" y="0" width="1280" height="3" fill="#D4AF37" />
    <rect x="0" y="717" width="1280" height="3" fill="#D4AF37" />
    <rect x="0" y="0" width="3" height="720" fill="#D4AF37" />
    <rect x="1277" y="0" width="3" height="720" fill="#D4AF37" />
  </g>

  <g id="title-marks" data-anim="true">
<rect x="80" y="120" width="60" height="2" fill="#D4AF37" />
    <text x="80" y="160" font-family="Georgia, serif" font-size="13" fill="#D4AF37" letter-spacing="4">LUXURY · EDITORIAL</text>
  </g>

  <g id="title-main" data-anim="true">
<text x="80" y="300" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FFFFFF">奢华</text>
    <text x="80" y="390" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FFFFFF">杂志</text>
    <text x="80" y="480" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#D4AF37">美学</text>
  </g>

  <g id="card-subtitle" data-anim="true">
<line x1="80" y1="520" x2="160" y2="520" stroke="#D4AF37" stroke-width="1.5" />
    <text x="80" y="550" font-family="Georgia, serif" font-size="18" fill="#B8A080">高端品牌视觉设计与排版艺术</text>
    <text x="80" y="580" font-family="Georgia, serif" font-size="14" fill="#8A7A6A">2026 年度设计趋势</text>
  </g>

  <g id="hero-luxury-pattern" data-anim="true">
<rect x="800" y="200" width="400" height="400" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.2" />
    <rect x="850" y="250" width="300" height="300" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.15" />
    <rect x="900" y="300" width="200" height="200" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.1" />
    <rect x="950" y="350" width="100" height="100" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.05" />
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#8A7A6A">01</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#8A7A6A" stroke-width="0.5" />
  </g>
</svg>
