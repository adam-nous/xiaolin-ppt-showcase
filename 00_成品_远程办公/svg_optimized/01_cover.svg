<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="coverBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1A2E" />
      <stop offset="50%" stop-color="#1B2A4A" />
      <stop offset="100%" stop-color="#0F1A2E" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#C9A96E" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#coverBg)" />
    <line x1="0" y1="171.45" x2="1219.2" y2="171.45" stroke="#1B3A5C" stroke-width="0.3" opacity="0.5" />
    <line x1="0" y1="342.9" x2="1219.2" y2="342.9" stroke="#1B3A5C" stroke-width="0.3" opacity="0.5" />
    <line x1="0" y1="514.35" x2="1219.2" y2="514.35" stroke="#1B3A5C" stroke-width="0.3" opacity="0.5" />
    <line x1="304.8" y1="0" x2="304.8" y2="685.8" stroke="#1B3A5C" stroke-width="0.3" opacity="0.5" />
    <line x1="609.6" y1="0" x2="609.6" y2="685.8" stroke="#1B3A5C" stroke-width="0.3" opacity="0.5" />
    <line x1="914.4" y1="0" x2="914.4" y2="685.8" stroke="#1B3A5C" stroke-width="0.3" opacity="0.5" />
  </g>

  <g id="title-marks">
    <rect x="76" y="114" width="60" height="3" fill="url(#goldGrad)" rx="1.5" />
    <text x="76" y="152" font-family="Georgia, serif" font-size="13" fill="#C9A96E" letter-spacing="2.5">REMOTE WORK · FUTURE</text>
  </g>

  <g id="title-main">
    <text x="76" y="285" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#FFFFFF">远程办公</text>
    <text x="76" y="365" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#FFFFFF">的</text>
    <text x="76" y="445" font-family="Georgia, serif" font-size="64" font-weight="700" fill="url(#goldGrad)">未来</text>
  </g>

  <g id="card-subtitle">
    <line x1="76" y1="485" x2="156" y2="485" stroke="#C9A96E" stroke-width="1.5" />
    <text x="76" y="515" font-family="Arial, sans-serif" font-size="18" fill="#A0B4D0">企业管理 · 远程协作 · 未来趋势</text>
    <text x="76" y="545" font-family="Arial, sans-serif" font-size="14" fill="#6B8BB8">自动动画 · 8页完整内容</text>
  </g>

  <g id="hero-logo" filter="url(#shadow)">
    <rect x="900" y="100" width="240" height="240" rx="20" fill="rgba(201,169,110,0.1)" stroke="#C9A96E" stroke-width="2" />
    <text x="1020" y="230" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#C9A96E" text-anchor="middle">R</text>
    <text x="1020" y="280" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">REMOTE</text>
  </g>

  <g id="footer">
    <text x="1143" y="658" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6B8BB8">01 / 08</text>
    <line x1="76" y1="658" x2="116" y2="658" stroke="#6B8BB8" stroke-width="0.5" />
  </g>
</svg>
