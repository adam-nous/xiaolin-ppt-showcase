<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="stratBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A" />
      <stop offset="100%" stop-color="#0F1A2E" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#stratBg)" />
    <rect x="0" y="0" width="1280" height="4" fill="#C9A96E" />
    <rect x="0" y="716" width="1280" height="4" fill="#C9A96E" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Georgia, serif" font-size="12" fill="#C9A96E" letter-spacing="3">STRATEGIC FRAMEWORK</text>
    <text x="80" y="100" font-family="Georgia, serif" font-size="36" fill="#FFFFFF">战略框架</text>
    <line x1="80" y1="115" x2="300" y2="115" stroke="#C9A96E" stroke-width="2" />
  </g>

  <g id="framework">
    <g id="vision">
      <rect x="440" y="150" width="400" height="80" fill="#C9A96E" opacity="0.2" />
      <text x="640" y="200" font-family="Georgia, serif" font-size="24" fill="#FFFFFF" text-anchor="middle">愿景与使命</text>
    </g>

    <g id="pillars">
      <rect x="120" y="280" width="240" height="120" fill="#C9A96E" opacity="0.15" />
      <text x="240" y="330" font-family="Georgia, serif" font-size="18" fill="#FFFFFF" text-anchor="middle">数字化转型</text>
      <text x="240" y="360" font-family="Arial, sans-serif" font-size="13" fill="#A0B4D0" text-anchor="middle">技术驱动创新</text>

      <rect x="400" y="280" width="240" height="120" fill="#C9A96E" opacity="0.1" />
      <text x="520" y="330" font-family="Georgia, serif" font-size="18" fill="#FFFFFF" text-anchor="middle">客户体验</text>
      <text x="520" y="360" font-family="Arial, sans-serif" font-size="13" fill="#A0B4D0" text-anchor="middle">以客户为中心</text>

      <rect x="680" y="280" width="240" height="120" fill="#C9A96E" opacity="0.15" />
      <text x="800" y="330" font-family="Georgia, serif" font-size="18" fill="#FFFFFF" text-anchor="middle">运营卓越</text>
      <text x="800" y="360" font-family="Arial, sans-serif" font-size="13" fill="#A0B4D0" text-anchor="middle">效率与质量并重</text>

      <rect x="960" y="280" width="240" height="120" fill="#C9A96E" opacity="0.1" />
      <text x="1080" y="330" font-family="Georgia, serif" font-size="18" fill="#FFFFFF" text-anchor="middle">人才发展</text>
      <text x="1080" y="360" font-family="Arial, sans-serif" font-size="13" fill="#A0B4D0" text-anchor="middle">构建核心团队</text>
    </g>

    <g id="arrows">
      <line x1="640" y1="230" x2="240" y2="280" stroke="#C9A96E" stroke-width="1" opacity="0.5" />
      <line x1="640" y1="230" x2="520" y2="280" stroke="#C9A96E" stroke-width="1" opacity="0.5" />
      <line x1="640" y1="230" x2="800" y2="280" stroke="#C9A96E" stroke-width="1" opacity="0.5" />
      <line x1="640" y1="230" x2="1080" y2="280" stroke="#C9A96E" stroke-width="1" opacity="0.5" />
    </g>
  </g>

  <g id="capabilities">
    <rect x="80" y="440" width="1120" height="150" fill="#C9A96E" opacity="0.05" />
    <text x="100" y="480" font-family="Georgia, serif" font-size="18" fill="#C9A96E">核心能力建设</text>
    <line x1="100" y1="490" x2="280" y2="490" stroke="#C9A96E" stroke-width="1" />
    <text x="100" y="520" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 数据分析能力：建立企业级数据平台</text>
    <text x="100" y="550" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• AI 应用能力：构建 AI 中台，赋能业务</text>
    <text x="100" y="580" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 敏捷组织能力：打造扁平化、快速响应的组织</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6B8BB8">05</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#6B8BB8" stroke-width="0.5" />
  </g>
</svg>
