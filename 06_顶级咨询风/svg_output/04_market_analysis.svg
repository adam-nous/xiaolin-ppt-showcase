<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="mktBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A" />
      <stop offset="100%" stop-color="#0F1A2E" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#mktBg)" />
    <rect x="0" y="0" width="1280" height="4" fill="#C9A96E" />
    <rect x="0" y="716" width="1280" height="4" fill="#C9A96E" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Georgia, serif" font-size="12" fill="#C9A96E" letter-spacing="3">MARKET ANALYSIS</text>
    <text x="80" y="100" font-family="Georgia, serif" font-size="36" fill="#FFFFFF">市场分析</text>
    <line x1="80" y1="115" x2="280" y2="115" stroke="#C9A96E" stroke-width="2" />
  </g>

  <g id="market-size" data-anim="true">
<rect x="80" y="150" width="360" height="200" fill="#C9A96E" opacity="0.1" />
    <text x="100" y="190" font-family="Georgia, serif" font-size="18" fill="#C9A96E">市场规模</text>
    <text x="260" y="260" font-family="Georgia, serif" font-size="48" fill="#FFFFFF" text-anchor="middle">$500B</text>
    <text x="260" y="290" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">2026 年预计市场规模</text>
    <text x="260" y="320" font-family="Arial, sans-serif" font-size="14" fill="#C9A96E" text-anchor="middle">↑ 25% YoY</text>
  </g>

  <g id="growth-trends">
    <rect x="460" y="150" width="360" height="200" fill="#C9A96E" opacity="0.05" />
    <text x="480" y="190" font-family="Georgia, serif" font-size="18" fill="#C9A96E">增长趋势</text>
    <rect x="500" y="220" width="40" height="80" fill="#C9A96E" opacity="0.3" />
    <rect x="560" y="240" width="40" height="60" fill="#C9A96E" opacity="0.4" />
    <rect x="620" y="230" width="40" height="70" fill="#C9A96E" opacity="0.5" />
    <rect x="680" y="210" width="40" height="90" fill="#C9A96E" opacity="0.6" />
    <rect x="740" y="190" width="40" height="110" fill="#C9A96E" opacity="0.8" />
    <text x="640" y="330" font-family="Arial, sans-serif" font-size="12" fill="#A0B4D0" text-anchor="middle">2022-2026 CAGR: 25%</text>
  </g>

  <g id="competitive-landscape">
    <rect x="840" y="150" width="360" height="200" fill="#C9A96E" opacity="0.08" />
    <text x="860" y="190" font-family="Georgia, serif" font-size="18" fill="#C9A96E">竞争格局</text>
    <circle cx="1020" cy="270" r="60" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.3" />
    <circle cx="1020" cy="270" r="40" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.5" />
    <circle cx="1020" cy="270" r="20" fill="#C9A96E" opacity="0.8" />
    <text x="1020" y="340" font-family="Arial, sans-serif" font-size="12" fill="#A0B4D0" text-anchor="middle">市场集中度: 高</text>
  </g>

  <g id="market-drivers" data-anim="true">
<rect x="80" y="380" width="1120" height="150" fill="#C9A96E" opacity="0.05" />
    <text x="100" y="420" font-family="Georgia, serif" font-size="18" fill="#C9A96E">市场驱动因素</text>
    <line x1="100" y1="430" x2="280" y2="430" stroke="#C9A96E" stroke-width="1" />
    <text x="100" y="460" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 数字化转型加速：企业 IT 支出增长 30%</text>
    <text x="100" y="490" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• AI 技术普及：生成式 AI 采用率提升至 60%</text>
    <text x="100" y="520" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 可持续发展：ESG 合规要求日益严格</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6B8BB8">04</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#6B8BB8" stroke-width="0.5" />
  </g>
</svg>
