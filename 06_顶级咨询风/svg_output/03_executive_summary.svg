<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="execBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A" />
      <stop offset="100%" stop-color="#0F1A2E" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#execBg)" />
    <rect x="0" y="0" width="1280" height="4" fill="#C9A96E" />
    <rect x="0" y="716" width="1280" height="4" fill="#C9A96E" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Georgia, serif" font-size="12" fill="#C9A96E" letter-spacing="3">EXECUTIVE SUMMARY</text>
    <text x="80" y="100" font-family="Georgia, serif" font-size="36" fill="#FFFFFF">执行摘要</text>
    <line x1="80" y1="115" x2="300" y2="115" stroke="#C9A96E" stroke-width="2" />
  </g>

  <g id="key-findings">
    <rect x="80" y="150" width="560" height="200" fill="#C9A96E" opacity="0.1" />
    <text x="100" y="190" font-family="Georgia, serif" font-size="18" fill="#C9A96E">核心发现</text>
    <line x1="100" y1="200" x2="220" y2="200" stroke="#C9A96E" stroke-width="1" />
    <text x="100" y="230" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 市场规模预计增长 25%</text>
    <text x="100" y="260" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 数字化转型是核心驱动力</text>
    <text x="100" y="290" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 客户需求向个性化转变</text>
    <text x="100" y="320" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 竞争格局正在重塑</text>
  </g>

  <g id="recommendations">
    <rect x="660" y="150" width="540" height="200" fill="#C9A96E" opacity="0.05" />
    <text x="680" y="190" font-family="Georgia, serif" font-size="18" fill="#C9A96E">关键建议</text>
    <line x1="680" y1="200" x2="800" y2="200" stroke="#C9A96E" stroke-width="1" />
    <text x="680" y="230" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 加速数字化转型投入</text>
    <text x="680" y="260" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 构建数据驱动的决策体系</text>
    <text x="680" y="290" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 优化组织架构与人才战略</text>
    <text x="680" y="320" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 建立战略合作生态</text>
  </g>

  <g id="expected-outcomes">
    <rect x="80" y="380" width="1120" height="120" fill="#C9A96E" opacity="0.08" />
    <text x="100" y="420" font-family="Georgia, serif" font-size="18" fill="#C9A96E">预期成果</text>
    <line x1="100" y1="430" x2="220" y2="430" stroke="#C9A96E" stroke-width="1" />
    <text x="100" y="460" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 3 年内收入增长 40% | 运营效率提升 30% | 客户满意度达到 95%</text>
  </g>

  <g id="investment">
    <rect x="80" y="530" width="360" height="100" fill="#C9A96E" opacity="0.15" />
    <text x="260" y="570" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle">$50M</text>
    <text x="260" y="600" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">预计投资规模</text>

    <rect x="460" y="530" width="360" height="100" fill="#C9A96E" opacity="0.1" />
    <text x="640" y="570" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle">18 个月</text>
    <text x="640" y="600" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">实施周期</text>

    <rect x="840" y="530" width="360" height="100" fill="#C9A96E" opacity="0.05" />
    <text x="1020" y="570" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle">3.5x</text>
    <text x="1020" y="600" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">投资回报率</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6B8BB8">03</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#6B8BB8" stroke-width="0.5" />
  </g>
</svg>
