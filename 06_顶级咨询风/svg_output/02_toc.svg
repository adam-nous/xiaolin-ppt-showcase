<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="tocBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A" />
      <stop offset="100%" stop-color="#0F1A2E" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#tocBg)" />
    <rect x="0" y="0" width="1280" height="4" fill="#C9A96E" />
    <rect x="0" y="716" width="1280" height="4" fill="#C9A96E" />
  </g>

  <g id="title-toc-header" data-anim="true">
<text x="80" y="80" font-family="Georgia, serif" font-size="12" fill="#C9A96E" letter-spacing="3">TABLE OF CONTENTS</text>
    <line x1="80" y1="90" x2="280" y2="90" stroke="#C9A96E" stroke-width="1" />
  </g>

  <g id="card-toc-items" data-anim="true">
<g id="item-1" data-anim="true">
<text x="80" y="160" font-family="Georgia, serif" font-size="36" fill="#C9A96E">01</text>
      <text x="200" y="150" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">执行摘要</text>
      <text x="200" y="180" font-family="Arial, sans-serif" font-size="14" fill="#6B8BB8">核心发现、关键建议、预期成果</text>
      <line x1="80" y1="200" x2="700" y2="200" stroke="#C9A96E" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-2" data-anim="true">
<text x="80" y="260" font-family="Georgia, serif" font-size="36" fill="#C9A96E">02</text>
      <text x="200" y="250" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">市场分析</text>
      <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#6B8BB8">行业趋势、竞争格局、市场机会</text>
      <line x1="80" y1="300" x2="700" y2="300" stroke="#C9A96E" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-3" data-anim="true">
<text x="80" y="360" font-family="Georgia, serif" font-size="36" fill="#C9A96E">03</text>
      <text x="200" y="350" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">战略框架</text>
      <text x="200" y="380" font-family="Arial, sans-serif" font-size="14" fill="#6B8BB8">战略方向、核心能力、资源配置</text>
      <line x1="80" y1="400" x2="700" y2="400" stroke="#C9A96E" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-4" data-anim="true">
<text x="80" y="460" font-family="Georgia, serif" font-size="36" fill="#C9A96E">04</text>
      <text x="200" y="450" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">实施路径</text>
      <text x="200" y="480" font-family="Arial, sans-serif" font-size="14" fill="#6B8BB8">阶段规划、里程碑、资源配置</text>
      <line x1="80" y1="500" x2="700" y2="500" stroke="#C9A96E" stroke-width="0.5" opacity="0.3" />
    </g>

    <g id="item-5" data-anim="true">
<text x="80" y="560" font-family="Georgia, serif" font-size="36" fill="#C9A96E">05</text>
      <text x="200" y="550" font-family="Georgia, serif" font-size="20" fill="#FFFFFF">财务预测</text>
      <text x="200" y="580" font-family="Arial, sans-serif" font-size="14" fill="#6B8BB8">投资回报、风险评估、敏感性分析</text>
    </g>
  </g>

  <g id="sidebar">
    <rect x="800" y="120" width="400" height="500" fill="#C9A96E" opacity="0.05" />
    <text x="1000" y="300" font-family="Georgia, serif" font-size="120" fill="#C9A96E" opacity="0.1" text-anchor="middle">02</text>
    <text x="1000" y="380" font-family="Arial, sans-serif" font-size="16" fill="#A0B4D0" text-anchor="middle">5 SECTIONS</text>
    <line x1="850" y1="400" x2="1150" y2="400" stroke="#C9A96E" stroke-width="0.5" opacity="0.3" />
    <text x="1000" y="440" font-family="Arial, sans-serif" font-size="14" fill="#6B8BB8" text-anchor="middle">8 PAGES</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6B8BB8">02</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#6B8BB8" stroke-width="0.5" />
  </g>
</svg>
