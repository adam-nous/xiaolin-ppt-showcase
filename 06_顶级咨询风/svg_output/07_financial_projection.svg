<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1219.2 685.8" width="1219.2" height="685.8">
  <defs>
    <linearGradient id="finBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B2A4A" />
      <stop offset="100%" stop-color="#0F1A2E" />
    </linearGradient>
  </defs>

  <g id="bg">
    <rect x="0" y="0" width="1219.2" height="685.8" fill="url(#finBg)" />
    <rect x="0" y="0" width="1280" height="4" fill="#C9A96E" />
    <rect x="0" y="716" width="1280" height="4" fill="#C9A96E" />
  </g>

  <g id="header" data-anim="true">
<text x="80" y="60" font-family="Georgia, serif" font-size="12" fill="#C9A96E" letter-spacing="3">FINANCIAL PROJECTION</text>
    <text x="80" y="100" font-family="Georgia, serif" font-size="36" fill="#FFFFFF">财务预测</text>
    <line x1="80" y1="115" x2="280" y2="115" stroke="#C9A96E" stroke-width="2" />
  </g>

  <g id="financial-metrics" data-anim="true">
<rect x="80" y="150" width="260" height="150" fill="#C9A96E" opacity="0.15" />
    <text x="210" y="200" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle">$175M</text>
    <text x="210" y="230" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">3 年累计收入</text>
    <text x="210" y="260" font-family="Arial, sans-serif" font-size="14" fill="#C9A96E" text-anchor="middle">↑ 40% 增长</text>

    <rect x="360" y="150" width="260" height="150" fill="#C9A96E" opacity="0.1" />
    <text x="490" y="200" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle">35%</text>
    <text x="490" y="230" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">毛利率</text>
    <text x="490" y="260" font-family="Arial, sans-serif" font-size="14" fill="#C9A96E" text-anchor="middle">持续优化</text>

    <rect x="640" y="150" width="260" height="150" fill="#C9A96E" opacity="0.15" />
    <text x="770" y="200" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle">3.5x</text>
    <text x="770" y="230" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">投资回报率</text>
    <text x="770" y="260" font-family="Arial, sans-serif" font-size="14" fill="#C9A96E" text-anchor="middle">18 个月回收</text>

    <rect x="920" y="150" width="280" height="150" fill="#C9A96E" opacity="0.1" />
    <text x="1060" y="200" font-family="Georgia, serif" font-size="36" fill="#FFFFFF" text-anchor="middle">$50M</text>
    <text x="1060" y="230" font-family="Arial, sans-serif" font-size="14" fill="#A0B4D0" text-anchor="middle">总投资规模</text>
    <text x="1060" y="260" font-family="Arial, sans-serif" font-size="14" fill="#C9A96E" text-anchor="middle">分阶段投入</text>
  </g>

  <g id="revenue-projection">
    <rect x="80" y="330" width="1120" height="200" fill="#C9A96E" opacity="0.05" />
    <text x="100" y="370" font-family="Georgia, serif" font-size="18" fill="#C9A96E">收入预测</text>
    <line x1="100" y1="380" x2="220" y2="380" stroke="#C9A96E" stroke-width="1" />
    <rect x="150" y="400" width="150" height="100" fill="#C9A96E" opacity="0.2" />
    <rect x="350" y="380" width="150" height="120" fill="#C9A96E" opacity="0.3" />
    <rect x="550" y="360" width="150" height="140" fill="#C9A96E" opacity="0.4" />
    <rect x="750" y="340" width="150" height="160" fill="#C9A96E" opacity="0.6" />
    <text x="225" y="520" font-family="Arial, sans-serif" font-size="12" fill="#A0B4D0" text-anchor="middle">Y1: $30M</text>
    <text x="425" y="520" font-family="Arial, sans-serif" font-size="12" fill="#A0B4D0" text-anchor="middle">Y2: $50M</text>
    <text x="625" y="520" font-family="Arial, sans-serif" font-size="12" fill="#A0B4D0" text-anchor="middle">Y3: $70M</text>
    <text x="825" y="520" font-family="Arial, sans-serif" font-size="12" fill="#A0B4D0" text-anchor="middle">Y4: $95M</text>
  </g>

  <g id="risk-assessment">
    <rect x="80" y="560" width="1120" height="80" fill="#C9A96E" opacity="0.08" />
    <text x="100" y="600" font-family="Georgia, serif" font-size="18" fill="#C9A96E">风险评估</text>
    <line x1="100" y1="610" x2="220" y2="610" stroke="#C9A96E" stroke-width="1" />
    <text x="100" y="630" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF">• 市场风险：竞争加剧 | 技术风险：AI 落地不确定性 | 执行风险：组织变革阻力</text>
  </g>

  <g id="footer">
    <text x="1200" y="694" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#6B8BB8">07</text>
    <line x1="80" y1="694" x2="120" y2="694" stroke="#6B8BB8" stroke-width="0.5" />
  </g>
</svg>
